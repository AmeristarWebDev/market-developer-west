<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Developer Team - West</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #ffffff; color: #1a1a1a; padding: 24px; max-width: 1400px; margin: 0 auto; line-height: 1.4; }
  .team-section h2 { font-size: 26px; font-weight: 600; color: #1a1a1a; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #0033a0; }
  .team-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 20px 14px; }
  .headshot-card { text-align: center; }
  .headshot-img-wrapper { width: 100%; aspect-ratio: 4 / 5; overflow: hidden; background: #e8e8e8; margin-bottom: 10px; }
  .headshot-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .headshot-name { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; line-height: 1.25; }
  .headshot-region { font-size: 12px; color: #666; font-weight: 400; }
  @media (max-width: 1200px) { .team-grid { grid-template-columns: repeat(5, 1fr); } }
  @media (max-width: 900px) { .team-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 700px) { .team-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 500px) { .team-grid { grid-template-columns: repeat(2, 1fr); } body { padding: 16px; } .team-section h2 { font-size: 20px; } .headshot-name { font-size: 15px; } }
</style>
</head>
<body>
  <section class="team-section">
    <h2>Market Developer Team - West</h2>
    <div class="team-grid">
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/timothy-algoe.jpg" alt="Timothy Algoe"></div>
        <div class="headshot-name">Timothy Algoe</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/david-phornsutiphaijit.jpg" alt="David Phornsutiphaijit"></div>
        <div class="headshot-name">David Phornsutiphaijit</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/peyton-mcburnett.jpg" alt="Peyton McBurnett"></div>
        <div class="headshot-name">Peyton McBurnett</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/melissa-busch.jpg" alt="Melissa Busch"></div>
        <div class="headshot-name">Melissa Busch</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/sean-russell.jpg" alt="Sean Russell"></div>
        <div class="headshot-name">Sean Russell</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/rachel-newton.jpg" alt="Rachel Newton"></div>
        <div class="headshot-name">Rachel Newton</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/kit-cranford.png" alt="Kit Cranford"></div>
        <div class="headshot-name">Kit Cranford</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/marcus-tejeda.png" alt="Marcus Tejeda"></div>
        <div class="headshot-name">Marcus Tejeda</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/brian-doss.png" alt="Brian Doss"></div>
        <div class="headshot-name">Brian Doss</div>
      </div>
    </div>
  </section>
</body>
</html>
