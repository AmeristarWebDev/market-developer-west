<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Developer Team - East</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #ffffff; color: #1a1a1a; padding: 0; max-width: 1400px; margin: 0 auto; line-height: 1.4; }
  .team-section h2 { font-size: 26px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #0033a0; }
  .team-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 18px 12px; }
  .headshot-card { text-align: center; }
  .headshot-img-wrapper { width: 100%; aspect-ratio: 4 / 5; overflow: hidden; background: #e8e8e8; margin-bottom: 10px; }
  .headshot-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .headshot-name { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; line-height: 1.25; }
  .headshot-region { font-size: 12px; color: #666; font-weight: 400; }
  @media (max-width: 1250px) { .team-grid { grid-template-columns: repeat(6, 1fr); } }
  @media (max-width: 900px) { .team-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 700px) { .team-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 500px) { .team-grid { grid-template-columns: repeat(2, 1fr); } body { padding: 16px; } .team-section h2 { font-size: 20px; } .headshot-name { font-size: 15px; } }
</style>
</head>
<body>
  <section class="team-section">
    <h2>Market Developer Team - East</h2>
    <div class="team-grid">
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/kris-hobbins.png" alt="Kris Hobbins"></div>
        <div class="headshot-name">Kris Hobbins</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/lance-mcgee.jpg" alt="Lance McGee"></div>
        <div class="headshot-name">Lance McGee</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/jim-boyd.jpg" alt="Jim Boyd"></div>
        <div class="headshot-name">Jim Boyd</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/griffin-wenger.jpg" alt="Griffin Wenger"></div>
        <div class="headshot-name">Griffin Wenger</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/patrick-hale.jpg" alt="Patrick Hale"></div>
        <div class="headshot-name">Patrick Hale</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/bryan-manke.jpg" alt="Bryan Manke"></div>
        <div class="headshot-name">Bryan Manke</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/shane-oliver.jpg" alt="Shane Oliver"></div>
        <div class="headshot-name">Shane Oliver</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/hunter-johnston.jpg" alt="Hunter Johnston"></div>
        <div class="headshot-name">Hunter Johnston</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/jose-rodriguez.jpg" alt="Jose Rodriguez"></div>
        <div class="headshot-name">Jose Rodriguez</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/derrik-rankins.jpg" alt="Derrik Rankins"></div>
        <div class="headshot-name">Derrik Rankins</div>
      </div>
    </div>
  </section>
</body>
</html>
